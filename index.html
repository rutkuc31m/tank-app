<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tank · E10</title>
  <meta name="theme-color" content="#0c0e0d">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="icon" href="./icon-192.png" type="image/png">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tank">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── TOKENS ──────────────────────────────────────── */
    :root {
      --bg:        #0c0e0d;
      --bg2:       #0f1213;
      --surface:   #15181a;
      --surface2:  #1c2022;
      --line:      #2a2f33;
      --line2:     #363c40;
      --ink:       #e8ebe4;
      --ink2:      #a8afa6;
      --mute:      #6b7280;
      --mute2:     #4a5056;
      --signal:    #d4ff3a;   /* phosphor lime */
      --signal-d:  #9bc41a;
      --warn:      #ff7a3d;   /* amber */
      --cool:      #5ec8ff;
      --r:  14px;
      --r2: 10px;
      --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }

    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { background: var(--bg); }
    body {
      font-family: var(--sans);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(212,255,58,.05), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(94,200,255,.035), transparent 60%),
        var(--bg);
    }
    body::before {
      content:'';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .05;
      mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
    }

    button, input { font-family: inherit; color: inherit; }
    button { border: none; background: none; cursor: pointer; }

    .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    .caps { text-transform: uppercase; letter-spacing: .14em; font-weight: 600; }

    /* ── PTR ─────────────────────────────────────────── */
    #ptr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; justify-content: center; align-items: center;
      height: 0; overflow: hidden; transition: height .15s;
      background: var(--surface); border-bottom: 1px solid var(--line);
      font-family: var(--mono); font-size: .7rem; color: var(--signal);
      letter-spacing: .18em; text-transform: uppercase;
    }
    #ptr svg { margin-right: 8px; }

    /* ── TOPBAR ──────────────────────────────────────── */
    .topbar {
      background: rgba(12,14,13,.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 99;
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      max-width: 680px; margin: 0 auto; height: 52px;
      padding: 0 18px; display: flex; align-items: center; gap: 10px;
    }
    .brand { display: flex; align-items: center; gap: 9px; flex: 1; }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--signal);
      display: grid; place-items: center;
      color: #0a0c00; font-family: var(--mono); font-weight: 700; font-size: .72rem;
      box-shadow: 0 0 18px -4px var(--signal);
    }
    .brand-text {
      font-family: var(--mono); font-size: .78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .22em; color: var(--ink);
    }
    .brand-text em { color: var(--signal); font-style: normal; font-weight: 700; }

    .icon-btn {
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--ink2); display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .icon-btn:hover, .icon-btn:active { background: var(--surface2); color: var(--ink); border-color: var(--line2); }
    .icon-btn.spinning svg { animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CTRLBAR ─────────────────────────────────────── */
    .ctrlbar { border-bottom: 1px solid var(--line); background: var(--bg2); }
    .ctrlbar-inner {
      max-width: 680px; margin: 0 auto;
      padding: 10px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .city-pill {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: .72rem;
      text-transform: uppercase; letter-spacing: .12em;
      color: var(--signal);
    }
    .city-pill svg { width: 12px; height: 12px; }
    .sep { width: 1px; height: 14px; background: var(--line2); }

    .seg {
      display: inline-flex; border: 1px solid var(--line); border-radius: 8px;
      overflow: hidden; background: var(--surface);
    }
    .seg-btn {
      padding: 5px 10px; font-family: var(--mono); font-size: .72rem;
      color: var(--mute); background: transparent;
      border-right: 1px solid var(--line); transition: all .15s;
    }
    .seg-btn:last-child { border-right: none; }
    .seg-btn.active { background: var(--signal); color: #0a0c00; font-weight: 700; }

    .status {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: .68rem; color: var(--ink2);
      text-transform: uppercase; letter-spacing: .1em;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--signal); box-shadow: 0 0 8px var(--signal);
      animation: pulse 1.3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }
    .status.err { color: var(--warn); }
    .status.err .status-dot { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: none; }

    /* ── PAGE ────────────────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
      padding: 16px 14px 100px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── SECTION LABELS ──────────────────────────────── */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: .68rem;
      color: var(--mute); text-transform: uppercase; letter-spacing: .22em;
      padding: 0 4px;
    }
    .section-label::before {
      content: ''; width: 10px; height: 1px; background: var(--line2);
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }

    /* ── HERO: CHEAPEST TOTEM ────────────────────────── */
    .hero {
      position: relative;
      border: 1px solid var(--signal-d);
      border-radius: var(--r);
      background:
        radial-gradient(600px 200px at 50% -20%, rgba(212,255,58,.18), transparent 70%),
        linear-gradient(180deg, #181c10 0%, #13160f 100%);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(212,255,58,.08),
        0 0 60px -20px rgba(212,255,58,.5),
        inset 0 1px 0 rgba(255,255,255,.04);
      animation: heroBreath 5s ease-in-out infinite;
    }
    @keyframes heroBreath {
      0%,100% { box-shadow: 0 0 0 1px rgba(212,255,58,.08), 0 0 60px -20px rgba(212,255,58,.5), inset 0 1px 0 rgba(255,255,255,.04); }
      50%     { box-shadow: 0 0 0 1px rgba(212,255,58,.14), 0 0 80px -15px rgba(212,255,58,.7), inset 0 1px 0 rgba(255,255,255,.06); }
    }
    .hero-notch {
      position: absolute; top: 0; right: 0;
      width: 28px; height: 28px;
      background: var(--signal);
      clip-path: polygon(100% 0, 100% 100%, 0 0);
    }
    .hero-head {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px 0;
    }
    .hero-tag {
      font-family: var(--mono); font-size: .66rem; font-weight: 700;
      color: var(--signal); text-transform: uppercase; letter-spacing: .22em;
      display: flex; align-items: center; gap: 6px;
    }
    .hero-tag::before {
      content: ''; width: 6px; height: 6px; background: var(--signal);
      box-shadow: 0 0 10px var(--signal);
      animation: pulse 1.3s ease-in-out infinite;
    }
    .hero-body { padding: 4px 16px 16px; }
    .hero-price {
      font-family: var(--mono); font-weight: 700;
      line-height: .95; color: var(--signal);
      font-size: clamp(3.2rem, 13vw, 4.6rem);
      letter-spacing: -0.04em;
      display: flex; align-items: baseline; gap: 4px;
      text-shadow: 0 0 40px rgba(212,255,58,.35);
    }
    .hero-price .sup {
      font-size: .38em; align-self: flex-start;
      margin-top: .18em;
      color: var(--signal-d);
    }
    .hero-price .eur {
      font-size: .32em; color: var(--ink2);
      margin-left: 4px; font-weight: 500;
    }
    .hero-meta {
      margin-top: 10px; display: flex; flex-wrap: wrap; gap: 12px 18px;
      font-family: var(--mono); font-size: .78rem; color: var(--ink);
    }
    .hero-meta .dim { color: var(--mute); }
    .hero-name { font-weight: 600; }
    .hero-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px dashed var(--line2);
      font-family: var(--mono); font-size: .7rem;
      color: var(--mute); text-transform: uppercase; letter-spacing: .14em;
    }
    .hero-foot a {
      color: var(--signal); text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
    }

    /* ── STRIP ───────────────────────────────────────── */
    .strip-wrap { margin: 0 -14px; padding: 0 14px; }
    .strip {
      display: flex; gap: 8px; overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .strip::-webkit-scrollbar { display: none; }
    .strip-card {
      flex: 0 0 140px;
      scroll-snap-align: start;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r2);
      padding: 10px 11px;
      display: flex; flex-direction: column; gap: 6px;
      cursor: pointer; transition: all .15s;
    }
    .strip-card:active { transform: scale(.97); border-color: var(--line2); }
    .strip-price {
      font-family: var(--mono); font-weight: 700;
      font-size: 1.15rem; color: var(--ink);
      letter-spacing: -0.02em;
    }
    .strip-price .sup { font-size: .55em; color: var(--mute); }
    .strip-name {
      font-size: .78rem; color: var(--ink);
      font-weight: 500; line-height: 1.15;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .strip-dist {
      font-family: var(--mono); font-size: .68rem;
      color: var(--mute); text-transform: uppercase; letter-spacing: .1em;
      display: flex; justify-content: space-between;
    }
    .strip-dist .closed { color: var(--warn); }

    /* ── CARD BASE ───────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
    }
    .card-head {
      padding: 12px 16px 4px;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .card-title {
      font-family: var(--mono); font-size: .68rem;
      color: var(--ink2); text-transform: uppercase; letter-spacing: .22em;
      font-weight: 600;
    }
    .card-sub { font-family: var(--mono); font-size: .68rem; color: var(--signal); text-transform: uppercase; letter-spacing: .14em; }
    .card-body { padding: 8px 16px 16px; }

    /* ── STATS ───────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
    .stat-item { padding: 4px 0; text-align: left; position: relative; }
    .stat-item + .stat-item { padding-left: 14px; }
    .stat-item + .stat-item::before {
      content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
      width: 1px; background: var(--line);
    }
    .stat-val {
      font-family: var(--mono); font-size: 1.15rem; font-weight: 700;
      color: var(--ink); letter-spacing: -0.02em;
    }
    .stat-val.accent { color: var(--signal); }
    .stat-label {
      font-family: var(--mono); font-size: .62rem;
      color: var(--mute); text-transform: uppercase; letter-spacing: .16em;
      margin-top: 4px;
    }

    /* ── RECHNER ─────────────────────────────────────── */
    .stepper-row {
      display: flex; align-items: stretch; gap: 10px;
      margin-bottom: 14px;
    }
    .step-btn {
      width: 48px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--surface2);
      color: var(--ink); font-size: 1.3rem; font-weight: 500;
      transition: all .12s;
    }
    .step-btn:active { background: var(--signal); color: #0a0c00; border-color: var(--signal); transform: scale(.96); }
    .step-display {
      flex: 1; position: relative;
      border: 1px solid var(--line); border-radius: 10px;
      background: linear-gradient(180deg, #0f1210, #15181a);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .step-display::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--signal), transparent);
      opacity: .3;
    }
    .step-inp {
      width: 100%; text-align: center;
      font-family: var(--mono); font-size: 1.7rem; font-weight: 700;
      color: var(--signal); background: transparent; border: none; outline: none;
      -moz-appearance: textfield;
      letter-spacing: -0.02em;
      text-shadow: 0 0 20px rgba(212,255,58,.4);
      padding: 8px 0;
    }
    .step-inp::-webkit-inner-spin-button, .step-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
    .step-unit {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-family: var(--mono); font-size: .85rem; color: var(--mute);
      pointer-events: none;
    }
    .rechner-result {
      display: grid; grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--line);
      margin: 0 -16px -16px;
    }
    .rechner-col { padding: 12px 16px; display: flex; flex-direction: column; gap: 3px; }
    .rechner-col + .rechner-col { border-left: 1px solid var(--line); }
    .rechner-val {
      font-family: var(--mono); font-size: 1.3rem; font-weight: 700;
      color: var(--signal); line-height: 1; letter-spacing: -0.02em;
    }
    .rechner-val.secondary { color: var(--ink); font-size: 1.05rem; }
    .rechner-label {
      font-family: var(--mono); font-size: .62rem;
      color: var(--mute); text-transform: uppercase; letter-spacing: .18em;
      margin-top: 2px;
    }
    .rechner-sub { font-family: var(--mono); font-size: .68rem; color: var(--ink2); margin-top: 1px; }

    /* ── LOCATION ────────────────────────────────────── */
    .loc-row { display: flex; gap: 8px; position: relative; }
    .loc-inp {
      flex: 1; padding: 10px 12px;
      background: var(--bg2); border: 1px solid var(--line); border-radius: 10px;
      color: var(--ink); font-size: .92rem; outline: none;
      transition: border-color .15s;
    }
    .loc-inp::placeholder { color: var(--mute); }
    .loc-inp:focus { border-color: var(--signal); box-shadow: 0 0 0 3px rgba(212,255,58,.08); }
    .loc-gps {
      padding: 0 12px; border: 1px solid var(--line); border-radius: 10px;
      background: var(--bg2); color: var(--ink2);
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .loc-gps.active {
      background: var(--signal); border-color: var(--signal); color: #0a0c00;
      box-shadow: 0 0 18px -4px var(--signal);
    }
    .loc-gps.active svg { animation: pulse-gps 2s ease-in-out infinite; }
    @keyframes pulse-gps { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    .loc-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--surface2); border: 1px solid var(--line2); border-radius: 10px;
      overflow: hidden; z-index: 100;
      box-shadow: 0 12px 32px rgba(0,0,0,.6);
    }
    .loc-results:empty { display: none; }
    .loc-result {
      padding: 10px 14px; font-size: .88rem; cursor: pointer;
      border-bottom: 1px solid var(--line); color: var(--ink);
    }
    .loc-result:last-child { border-bottom: none; }
    .loc-result:hover, .loc-result:active { background: var(--surface); color: var(--signal); }
    .loc-result-sub { font-family: var(--mono); font-size: .68rem; color: var(--mute); margin-top: 2px; }

    /* ── STATION LIST ────────────────────────────────── */
    .list-toggle {
      width: 100%; padding: 12px;
      font-family: var(--mono); font-size: .72rem;
      color: var(--ink2); text-transform: uppercase; letter-spacing: .2em;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all .15s;
    }
    .list-toggle:hover { color: var(--signal); border-color: var(--line2); }

    .s-list { display: flex; flex-direction: column; gap: 8px; }
    .s-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r2);
      cursor: pointer;
      display: grid;
      grid-template-columns: 4px 1fr auto;
      overflow: hidden;
      transition: border-color .15s, transform .08s;
    }
    .s-card:active { transform: scale(.995); }
    .s-rail {
      background: var(--mute2);
    }
    .s-card.rank-0 .s-rail { background: var(--signal); }
    .s-card.rank-1 .s-rail { background: color-mix(in srgb, var(--signal) 65%, var(--mute2)); }
    .s-card.rank-2 .s-rail { background: color-mix(in srgb, var(--signal) 35%, var(--mute2)); }

    .s-main { padding: 11px 14px; min-width: 0; }
    .s-name {
      font-size: .92rem; font-weight: 600; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .s-meta {
      margin-top: 3px; display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: .68rem; color: var(--mute);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .s-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--mute2); }
    .s-addr { color: var(--ink2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

    .s-right {
      padding: 11px 14px 11px 10px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
      border-left: 1px solid var(--line);
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.12));
    }
    .s-price {
      font-family: var(--mono); font-weight: 700;
      font-size: 1.25rem; color: var(--ink);
      letter-spacing: -0.02em; line-height: 1;
      display: flex; align-items: baseline;
    }
    .s-price .sup { font-size: .55em; color: var(--mute); margin-left: 1px; }
    .s-card.rank-0 .s-price { color: var(--signal); text-shadow: 0 0 20px rgba(212,255,58,.3); }
    .s-price.closed { color: var(--mute2); text-decoration: line-through; text-decoration-thickness: 1px; }

    .s-trend {
      font-family: var(--mono); font-size: .66rem;
      display: flex; align-items: center; gap: 3px;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .trend-up   { color: var(--warn); }
    .trend-down { color: var(--signal); }

    .s-pill {
      font-family: var(--mono); font-size: .58rem; font-weight: 700;
      padding: 2px 6px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: .14em;
    }
    .s-pill.open { background: rgba(212,255,58,.1); color: var(--signal); }
    .s-pill.closed { background: rgba(255,122,61,.12); color: var(--warn); }

    /* ── SETUP ───────────────────────────────────────── */
    .setup {
      max-width: 420px; margin: 80px auto; padding: 0 24px;
      position: relative; z-index: 1;
    }
    .setup-mark {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--signal); color: #0a0c00;
      display: grid; place-items: center;
      font-family: var(--mono); font-weight: 700; font-size: 1.4rem;
      margin-bottom: 20px;
      box-shadow: 0 0 40px -10px var(--signal);
    }
    .setup h2 {
      font-family: var(--mono); font-size: 1.5rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .setup h2 em { color: var(--signal); font-style: normal; }
    .setup p {
      color: var(--ink2); font-size: .94rem; line-height: 1.55; margin-bottom: 24px;
    }
    .setup-label {
      font-family: var(--mono); font-size: .66rem; color: var(--mute);
      text-transform: uppercase; letter-spacing: .22em; margin-bottom: 8px;
      display: block;
    }
    .key-inp {
      width: 100%; padding: 13px 14px;
      background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
      color: var(--ink); font-family: var(--mono); font-size: .86rem;
      outline: none; transition: border-color .15s;
    }
    .key-inp:focus { border-color: var(--signal); box-shadow: 0 0 0 3px rgba(212,255,58,.08); }
    .key-btn {
      margin-top: 12px; width: 100%; padding: 14px;
      background: var(--signal); border-radius: 10px;
      color: #0a0c00; font-family: var(--mono); font-size: .82rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: .18em;
      transition: all .15s;
    }
    .key-btn:active { transform: scale(.98); background: var(--signal-d); }

    /* ── SKEL / EMPTY ────────────────────────────────── */
    .skel {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--r2); height: 68px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--mute);
      font-family: var(--mono); font-size: .82rem;
      text-transform: uppercase; letter-spacing: .18em;
    }

    /* ── STAGGERED ENTRANCE ──────────────────────────── */
    .page > * { animation: fadeUp .5s cubic-bezier(.2,.8,.2,1) both; }
    .page > *:nth-child(1) { animation-delay: .02s; }
    .page > *:nth-child(2) { animation-delay: .08s; }
    .page > *:nth-child(3) { animation-delay: .14s; }
    .page > *:nth-child(4) { animation-delay: .20s; }
    .page > *:nth-child(5) { animation-delay: .26s; }
    .page > *:nth-child(6) { animation-delay: .32s; }
    .page > *:nth-child(n+7) { animation-delay: .38s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
<div id="ptr">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/><polyline points="21 4 21 10 15 10"/></svg>
  <span id="ptr-text">Ziehen</span>
</div>
<div id="app"></div>

<script>
/* ── Keys ────────────────────────────────────────── */
const LS = { key:'t_key', radius:'t_radius', cache:'t_cache', gps:'t_gps', loc:'t_loc', liters:'t_liters', listOpen:'t_listopen' };
const FALLBACK = { lat: 52.3759, lng: 9.7320, city: 'Hannover' };
const RADII    = [3, 5, 10];
const FUEL     = 'e10';
const CAR      = { tank: 44, consumption: 7.0 };

/* ── Helpers ─────────────────────────────────────── */
function lsGet(k, d='')   { try { return localStorage.getItem(k) ?? d; } catch { return d; } }
function lsSet(k, v)      { try { localStorage.setItem(k, String(v)); } catch {} }
function lsJson(k, d)     { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } }
function lsJsonSet(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

function num(p)   { return p && p > 0 ? p : null; }
function fmtTime(d) { return d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' }); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

/* Split price into main (X.YZ) + superscript 3rd decimal */
function splitPrice(p) {
  if (!num(p)) return null;
  const s = p.toFixed(3);
  return { main: s.slice(0, -1).replace('.', ','), sup: s.slice(-1) };
}
function priceHtml(p, opts={}) {
  const sp = splitPrice(p);
  if (!sp) return '<span class="mono" style="color:var(--mute)">—</span>';
  const eur = opts.euro ? '<span class="eur">€</span>' : '';
  return `${sp.main}<span class="sup">${sp.sup}</span>${eur}`;
}

/* ── State ───────────────────────────────────────── */
const cached = lsJson(LS.cache, null);
let st = {
  key:      lsGet(LS.key),
  radius:   parseInt(lsGet(LS.radius, '10')) || 10,
  useGps:   lsGet(LS.gps) === '1',
  gpsPos:       null,
  ipLoc:        lsJson(LS.loc, null),
  locSearch:    { query: '', results: [], timer: null },
  stations:     cached?.stations || [],
  updated:      cached?.ts ? new Date(cached.ts) : null,
  prevPrices:   {},
  euros:        parseInt(lsGet('t_euros', '20')) || 20,
  loading:      false,
  error:        null,
  listOpen:     lsGet(LS.listOpen) === '1',
};

/* ── Sort + Cheapest ─────────────────────────────── */
function sortedStations() {
  return [...st.stations].sort((a, b) => {
    const pa = num(a[FUEL]) || 9999, pb = num(b[FUEL]) || 9999;
    return pa !== pb ? pa - pb : (a.dist || 0) - (b.dist || 0);
  }).slice(0, 12);
}
function cheapestOf(list) {
  const ps = list.filter(s => s.isOpen).map(s => num(s[FUEL])).filter(Boolean);
  return ps.length ? Math.min(...ps) : null;
}

/* ── Location ────────────────────────────────────── */
async function getIpLoc() {
  if (st.ipLoc) return { lat: st.ipLoc.lat, lng: st.ipLoc.lng };
  try {
    const r = await fetch('https://ipwho.is/', { signal: AbortSignal.timeout(5000) }).then(r => r.json());
    if (r.success && r.latitude) {
      st.ipLoc = { lat: r.latitude, lng: r.longitude, city: r.city || r.region || 'Mein Standort' };
      lsJsonSet(LS.loc, st.ipLoc);
      return { lat: st.ipLoc.lat, lng: st.ipLoc.lng };
    }
  } catch {}
  return null;
}
async function getPos() {
  if (st.useGps) {
    if (st.gpsPos) return st.gpsPos;
    return new Promise(resolve => {
      navigator.geolocation.getCurrentPosition(
        p => { st.gpsPos = { lat: p.coords.latitude, lng: p.coords.longitude }; resolve(st.gpsPos); },
        async () => resolve((await getIpLoc()) || FALLBACK),
        { timeout: 8000, maximumAge: 60000 }
      );
    });
  }
  return (await getIpLoc()) || FALLBACK;
}
function toggleGps() { st.useGps = !st.useGps; st.gpsPos = null; lsSet(LS.gps, st.useGps ? '1' : '0'); load(); }

/* ── Load ────────────────────────────────────────── */
async function load() {
  if (!st.key) return;
  st.loading = true; st.error = null;
  render();
  try {
    const pos  = await getPos();
    const url  = `https://creativecommons.tankerkoenig.de/json/list.php?lat=${pos.lat}&lng=${pos.lng}&rad=${st.radius}&sort=dist&type=all&apikey=${st.key}`;
    const data = await fetch(url).then(r => r.json());
    if (!data.ok) throw new Error(data.message || 'API-Fehler');
    const prev = {};
    st.stations.forEach(s => { if (num(s[FUEL])) prev[s.id] = s[FUEL]; });
    st.prevPrices = prev;
    st.stations = data.stations || [];
    st.updated  = new Date();
    lsJsonSet(LS.cache, { stations: st.stations, ts: st.updated.toISOString() });
  } catch(e) { st.error = e.message; }
  st.loading = false;
  render();
}

/* ── City Search ─────────────────────────────────── */
async function searchCities(q) {
  if (q.length < 2) { st.locSearch.results = []; renderLocResults(); return; }
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=20&language=de`).then(r => r.json());
    const seen = new Set();
    st.locSearch.results = (r.results || []).filter(c => {
      if (c.country_code !== 'DE') return false;
      const key = c.name.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  } catch { st.locSearch.results = []; }
  renderLocResults();
}
function renderLocResults() {
  const el = document.getElementById('loc-results');
  if (!el) return;
  el.innerHTML = st.locSearch.results.map((c, i) => `
    <div class="loc-result" onclick="selectCity(${i})">
      <div>${escapeHtml(c.name)}</div>
      <div class="loc-result-sub">${escapeHtml([c.admin1, c.country].filter(Boolean).join(' · '))}</div>
    </div>`).join('');
}
function selectCity(i) {
  const c = st.locSearch.results[i];
  if (!c) return;
  st.ipLoc = { lat: c.latitude, lng: c.longitude, city: c.name };
  lsJsonSet(LS.loc, st.ipLoc);
  st.locSearch = { query: '', results: [], timer: null };
  load();
}

/* ── ICONS ───────────────────────────────────────── */
const ICON = {
  pin:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>',
  cross:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>',
  refresh:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>',
  gear:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  arrow:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
  chevDown:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  up:'<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>',
  down:'<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>',
};

/* ── Render ──────────────────────────────────────── */
function render() {
  document.getElementById('app').innerHTML = st.key ? renderMain() : renderSetup();
  attach();
}

function renderSetup() {
  return `
  <div class="setup">
    <div class="setup-mark">E10</div>
    <h2>Tank<em>·</em>App</h2>
    <p>Live-Spritpreise aus deiner Umgebung. Hol dir einen kostenlosen Tankerkönig API-Key und leg los.</p>
    <span class="setup-label">API · Key</span>
    <input class="key-inp" id="kinp" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    <button class="key-btn" id="ksave">Start &rarr;</button>
  </div>`;
}

function setEuros(e, skipRender) {
  st.euros = Math.max(1, Math.min(500, Math.round(e) || 1));
  lsSet('t_euros', st.euros);
  if (skipRender) {
    const res = document.querySelector('.rechner-result');
    if (res) {
      const minPrice = cheapestOf(sortedStations());
      const litersNum = minPrice ? st.euros / minPrice : null;
      const km = litersNum ? Math.round(litersNum / CAR.consumption * 100) : null;
      const fullTank = minPrice ? (CAR.tank * minPrice).toFixed(2).replace('.', ',') : null;
      const cols = res.querySelectorAll('.rechner-col');
      if (cols[0]) {
        cols[0].querySelector('.rechner-val').textContent = km ? '≈\u202f' + km + '\u202fkm' : '—';
        const sub0 = cols[0].querySelector('.rechner-sub');
        if (sub0) sub0.textContent = litersNum ? litersNum.toFixed(2).replace('.',',') + '\u202fL · E10' : '';
      }
      if (cols[1]) cols[1].querySelector('.rechner-val').textContent = fullTank ? fullTank + '\u202f€' : '—';
    }
  } else {
    render();
  }
}

function renderHero(top, minPrice) {
  if (!top || !minPrice) return '';
  return `
  <div class="hero" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${top.lat},${top.lng}','_blank')">
    <div class="hero-notch"></div>
    <div class="hero-head">
      <span class="hero-tag">Bestpreis · E10</span>
    </div>
    <div class="hero-body">
      <div class="hero-price mono">${priceHtml(top[FUEL])}<span class="eur">€</span></div>
      <div class="hero-meta">
        <span class="hero-name">${escapeHtml(top.name || top.brand || 'Tankstelle')}</span>
        <span class="dim">${top.dist ? top.dist.toFixed(1).replace('.',',')+' km' : ''}</span>
        <span class="dim">${escapeHtml([top.street, top.place].filter(Boolean).join(', '))}</span>
      </div>
    </div>
    <div class="hero-foot">
      <span>Navigieren</span>
      <a>Route öffnen ${ICON.arrow}</a>
    </div>
  </div>`;
}

function renderStrip(list) {
  if (list.length < 2) return '';
  const others = list.slice(1, 6);
  if (!others.length) return '';
  return `
    <div class="section-label">Nächste ${others.length}</div>
    <div class="strip-wrap">
      <div class="strip">
        ${others.map(s => {
          const p = num(s[FUEL]);
          const sp = splitPrice(p);
          return `<div class="strip-card" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}','_blank')">
            <div class="strip-price">${sp ? sp.main+'<span class="sup">'+sp.sup+'</span>' : '—'}</div>
            <div class="strip-name">${escapeHtml(s.name || s.brand || 'Tankstelle')}</div>
            <div class="strip-dist"><span>${s.dist ? s.dist.toFixed(1).replace('.',',')+' km' : ''}</span><span class="${s.isOpen?'':'closed'}">${s.isOpen?'Offen':'Zu'}</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderStats(stations) {
  const prices = stations.map(s => num(s[FUEL])).filter(Boolean);
  if (prices.length < 2) return '';
  const minP = Math.min(...prices);
  const maxP = Math.max(...prices);
  const avgP = prices.reduce((a, b) => a + b, 0) / prices.length;
  const spread = ((maxP - minP) * 100).toFixed(1).replace('.', ',');
  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">Umgebung</div>
      <div class="card-sub">${prices.length} Stationen</div>
    </div>
    <div class="card-body">
      <div class="stats-row">
        <div class="stat-item"><div class="stat-val accent mono">${minP.toFixed(3).replace('.',',')}</div><div class="stat-label">Min €/L</div></div>
        <div class="stat-item"><div class="stat-val mono">${avgP.toFixed(3).replace('.',',')}</div><div class="stat-label">Durchschnitt</div></div>
        <div class="stat-item"><div class="stat-val mono">${spread}</div><div class="stat-label">Δ Cent</div></div>
      </div>
    </div>
  </div>`;
}

function renderRechner(minPrice) {
  const litersNum = minPrice ? st.euros / minPrice : null;
  const liters    = litersNum ? litersNum.toFixed(2).replace('.', ',') : '—';
  const km        = litersNum ? Math.round(litersNum / CAR.consumption * 100) : null;
  const fullTank  = minPrice  ? (Math.round(CAR.tank * minPrice * 100) / 100).toFixed(2).replace('.',',') : null;
  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">Rechner</div>
      <div class="card-sub">Opel Mokka · ${CAR.consumption.toString().replace('.',',')}L/100</div>
    </div>
    <div class="card-body">
      <div class="stepper-row">
        <button class="step-btn" onclick="setEuros(st.euros-5)">−</button>
        <div class="step-display">
          <input class="step-inp mono" id="euros-inp" type="number" inputmode="numeric" min="1" max="500" value="${st.euros}" oninput="setEuros(+this.value||1,true)">
          <span class="step-unit">€</span>
        </div>
        <button class="step-btn" onclick="setEuros(st.euros+5)">+</button>
      </div>
      <div class="rechner-result">
        <div class="rechner-col">
          <div class="rechner-val mono">${km ? km + '\u202fkm' : '—'}</div>
          <div class="rechner-label">Reichweite</div>
          <div class="rechner-sub">${litersNum ? liters+'\u202fL · E10' : 'Preis lädt…'}</div>
        </div>
        <div class="rechner-col">
          <div class="rechner-val secondary mono">${fullTank ? fullTank+'\u202f€' : '—'}</div>
          <div class="rechner-label">Volltank · ${CAR.tank}L</div>
          <div class="rechner-sub">beim Bestpreis</div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderLocPrompt() {
  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">Standort</div>
    </div>
    <div class="card-body">
      <div class="loc-row">
        <input id="loc-inp" class="loc-inp" type="search" placeholder="Stadt suchen…" autocomplete="off" value="${escapeHtml(st.locSearch.query)}">
        <button class="loc-gps${st.useGps ? ' active' : ''}" onclick="toggleGps()" title="GPS">${ICON.cross}</button>
        <div id="loc-results" class="loc-results"></div>
      </div>
    </div>
  </div>`;
}

function renderStationList(list, minPrice) {
  if (!list.length) return '';
  return `
    <div class="section-label">Alle Stationen</div>
    ${st.listOpen ? `
      <div class="s-list">${list.map((s, i) => renderStationCard(s, minPrice, i)).join('')}</div>
    ` : `
      <button class="list-toggle" onclick="st.listOpen=true;lsSet('t_listopen','1');render();">
        ${list.length} Stationen zeigen ${ICON.chevDown}
      </button>
    `}
  `;
}

function renderStationCard(s, minPrice, rank) {
  const p = num(s[FUEL]);
  const sp = splitPrice(p);
  const rankCls = rank <= 2 ? ` rank-${rank}` : '';

  let trendHtml = '';
  const prev = st.prevPrices[s.id];
  if (prev && p && Math.abs(p - prev) >= 0.001) {
    const delta = (p - prev);
    const deltaFmt = (delta > 0 ? '+' : '−') + Math.abs(delta * 100).toFixed(1).replace('.', ',');
    const dir = delta < 0 ? 'trend-down' : 'trend-up';
    const icon = delta < 0 ? ICON.down : ICON.up;
    trendHtml = `<div class="s-trend ${dir}">${icon}<span>${deltaFmt}</span></div>`;
  }

  const priceCls = s.isOpen ? '' : 'closed';
  const priceMarkup = sp
    ? `<div class="s-price ${priceCls}">${sp.main}<span class="sup">${sp.sup}</span></div>`
    : `<div class="s-price ${priceCls}">—</div>`;

  return `
  <div class="s-card${rankCls}" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}','_blank')">
    <div class="s-rail"></div>
    <div class="s-main">
      <div class="s-name">${escapeHtml(s.name || s.brand || 'Tankstelle')}</div>
      <div class="s-meta">
        <span class="mono">${s.dist ? s.dist.toFixed(1).replace('.',',')+' km' : ''}</span>
        <span class="dot"></span>
        <span class="s-addr">${escapeHtml([s.street, s.place].filter(Boolean).join(', '))}</span>
      </div>
    </div>
    <div class="s-right">
      ${priceMarkup}
      ${trendHtml || `<span class="s-pill ${s.isOpen?'open':'closed'}">${s.isOpen?'Offen':'Zu'}</span>`}
    </div>
  </div>`;
}

function renderMain() {
  const all = sortedStations();
  const minPrice = cheapestOf(all);
  const hasCache = st.stations.length > 0;
  const city = st.useGps && st.gpsPos ? 'GPS · Live' : (st.ipLoc?.city || FALLBACK.city);
  const top = all.find(s => s.isOpen && num(s[FUEL]) === minPrice) || all[0];

  const statusHtml = st.error
    ? `<span class="status err"><span class="status-dot"></span>Fehler</span>`
    : st.updated
      ? `<span class="status">${st.loading ? '<span class="status-dot"></span>' : ''}${st.loading ? 'Sync…' : fmtTime(st.updated)}</span>`
      : st.loading ? `<span class="status"><span class="status-dot"></span>Lade…</span>` : '';

  let heroBlock;
  if (st.loading && !hasCache) {
    heroBlock = `<div class="skel" style="height:200px"></div>`;
  } else if (!top) {
    heroBlock = `<div class="empty">Keine Stationen gefunden</div>`;
  } else {
    heroBlock = renderHero(top, minPrice);
  }

  return `
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">⌬</div>
        <div class="brand-text">Tank<em>·</em>App</div>
      </div>
      <button class="icon-btn" id="sbtn" title="API-Key">${ICON.gear}</button>
      <button class="icon-btn${st.loading ? ' spinning' : ''}" id="rbtn" title="Aktualisieren">${ICON.refresh}</button>
    </div>
  </div>
  <div class="ctrlbar">
    <div class="ctrlbar-inner">
      <span class="city-pill">${ICON.pin}${escapeHtml(city)}</span>
      <span class="sep"></span>
      <div class="seg">
        ${RADII.map(r => `<button class="seg-btn${st.radius===r?' active':''}" data-rad="${r}">${r}km</button>`).join('')}
      </div>
      ${statusHtml}
    </div>
  </div>
  <div class="page">
    ${heroBlock}
    ${all.length > 1 ? renderStrip(all) : ''}
    ${renderRechner(minPrice)}
    ${all.length ? renderStats(all) : ''}
    ${renderLocPrompt()}
    ${renderStationList(all, minPrice)}
  </div>`;
}

/* ── Attach ──────────────────────────────────────── */
function attach() {
  const ksave = document.getElementById('ksave');
  const kinp  = document.getElementById('kinp');
  if (ksave) {
    ksave.onclick = () => { const v = kinp.value.trim(); if (v) { st.key = v; lsSet(LS.key, v); load(); } };
    kinp.onkeydown = e => { if (e.key === 'Enter') ksave.click(); };
  }
  const rbtn = document.getElementById('rbtn');
  const sbtn = document.getElementById('sbtn');
  if (rbtn) rbtn.onclick = () => { if (!st.loading) load(); };
  if (sbtn) sbtn.onclick = () => {
    const v = prompt('Tankerkönig API-Key:', st.key);
    if (v !== null && v.trim()) { st.key = v.trim(); lsSet(LS.key, st.key); load(); }
  };
  document.querySelectorAll('[data-rad]').forEach(el => {
    el.onclick = () => { st.radius = parseInt(el.dataset.rad); lsSet(LS.radius, st.radius); load(); };
  });
  const locInp = document.getElementById('loc-inp');
  if (locInp) {
    locInp.oninput = e => {
      st.locSearch.query = e.target.value;
      clearTimeout(st.locSearch.timer);
      st.locSearch.timer = setTimeout(() => searchCities(st.locSearch.query), 300);
    };
  }
}

/* ── Close dropdown on outside click ────────────── */
document.addEventListener('click', e => {
  const inp = document.getElementById('loc-inp');
  const res = document.getElementById('loc-results');
  if (!inp || !res) return;
  if (!inp.contains(e.target) && !res.contains(e.target)) {
    st.locSearch.results = [];
    res.innerHTML = '';
  }
});

/* ── Pull-to-Refresh ─────────────────────────────── */
const ptr_el   = document.getElementById('ptr');
const ptr_txt  = document.getElementById('ptr-text');
let ptr_startY = 0, ptr_pulling = false;
document.addEventListener('touchstart', e => { ptr_startY = window.scrollY < 5 ? e.touches[0].clientY : 0; }, { passive: true });
document.addEventListener('touchmove', e => {
  if (!ptr_startY || st.loading) return;
  const dy = e.touches[0].clientY - ptr_startY;
  if (dy > 4) { ptr_pulling = true; const h = Math.min(dy * 0.75, 56); ptr_el.style.height = h + 'px'; ptr_txt.textContent = h >= 30 ? 'Loslassen' : 'Ziehen'; }
}, { passive: true });
document.addEventListener('touchend', () => {
  if (ptr_pulling && parseInt(ptr_el.style.height) >= 30) { ptr_el.style.height = '46px'; ptr_txt.textContent = 'Sync…'; load().finally(() => { ptr_el.style.height = '0'; }); }
  else { ptr_el.style.height = '0'; }
  ptr_startY = 0; ptr_pulling = false;
}, { passive: true });

/* ── Auto-Refresh & Boot ─────────────────────────── */
setInterval(() => { if (st.key && !st.loading) load(); }, 5 * 60 * 1000);
if (st.key) load(); else render();
</script>
</body>
