<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tank App — Hannover</title>
  <meta name="theme-color" content="#0a0a0b">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="icon" href="./icon-192.png" type="image/png">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tank App">
  <style>
    :root {
      --bg: #0a0a0b; --card: #18181b; --card2: #27272a; --border: #3f3f46;
      --text: #fafafa; --text2: #a1a1aa; --text3: #71717a;
      --accent: #bae6fd; --accent-subtle: #0c2840; --radius: 12px;
      --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* PTR */
    #ptr { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; justify-content: center; align-items: center; height: 0; overflow: hidden; transition: height .15s; background: var(--card); border-bottom: 1px solid var(--border); font-size: .85rem; color: var(--text2); }

    /* Header */
    header { padding: 20px 16px 0; max-width: 500px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-left h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn { background: var(--card2); border: 1px solid var(--border); color: var(--text2); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; flex-shrink: 0; }
    .icon-btn:hover { color: var(--text); }
    .icon-btn.spinning { animation: spin 0.8s linear infinite; }
    .icon-btn.active { background: var(--accent-subtle); border-color: var(--accent); color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Controls */
    .controls { max-width: 500px; margin: 12px auto 0; padding: 0 16px; }
    .opt-group { display: flex; align-items: center; gap: 6px; }
    .opt-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
    .opt-btn { padding: 5px 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .opt-btn.active { background: var(--card2); color: var(--text); border-color: var(--text3); }

    /* Statusbar */
    .statusbar { max-width: 500px; margin: 8px auto 0; padding: 0 16px; display: flex; align-items: center; gap: 8px; }
    .status-text { font-size: 12px; color: var(--text3); }
    .status-err { font-size: 12px; color: var(--red); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

    /* List */
    .list { max-width: 500px; margin: 10px auto 80px; padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
    .list-divider { font-size: 11px; color: var(--text3); padding: 4px 2px; display: flex; align-items: center; gap: 8px; }
    .list-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Weekly chart card */
    .week-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 14px 12px; }
    .week-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .week-title { font-size: 13px; font-weight: 600; color: var(--text2); }
    .week-trend { font-size: 12px; }
    .week-trend.up   { color: var(--red); }
    .week-trend.down { color: var(--green); }
    .week-trend.eq   { color: var(--text3); }
    .week-nodata { font-size: 12px; color: var(--text3); padding: 16px 0 8px; text-align: center; }

    /* Station card */
    .s-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: border-color 0.2s; }
    .s-card:active { opacity: 0.85; }
    .s-card.cheapest { border-color: color-mix(in srgb, var(--accent) 50%, transparent); }
    .s-card.fav-card  { border-color: color-mix(in srgb, var(--yellow) 40%, transparent); }

    .s-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .s-info { flex: 1; min-width: 0; }
    .s-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-brand { font-size: 12px; color: var(--text3); margin-top: 1px; }
    .s-addr  { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .fav-btn { background: none; border: none; font-size: 17px; cursor: pointer; padding: 0; line-height: 1; transition: transform 0.15s; color: var(--text3); }
    .fav-btn:hover { transform: scale(1.25); }
    .fav-btn.on { color: var(--yellow); }
    .dist-badge { font-size: 12px; color: var(--text3); }
    .open-pill { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; }
    .open-pill.open   { background: color-mix(in srgb, var(--accent) 14%, var(--card)); color: var(--accent); }
    .open-pill.closed { background: color-mix(in srgb, var(--border) 40%, var(--card)); color: var(--text3); }

    .tags-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 600; }
    .tag-cheapest { color: var(--accent); }
    .tag-fav      { color: var(--yellow); }

    .price-row { display: flex; align-items: center; gap: 10px; }
    .price-main { font-size: 30px; font-weight: 800; line-height: 1; color: var(--text); }
    .price-main.accent { color: var(--accent); }
    .trend { font-size: 17px; font-weight: 700; }
    .trend-up   { color: var(--red); }
    .trend-down { color: var(--green); }
    .trend-eq   { color: var(--text3); }

    /* Setup */
    .setup { max-width: 400px; margin: 80px auto; padding: 0 24px; text-align: center; }
    .setup-icon { font-size: 44px; margin-bottom: 16px; }
    .setup h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .setup p { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .key-inp { width: 100%; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; font-family: monospace; outline: none; transition: border-color 0.2s; }
    .key-inp:focus { border-color: var(--accent); }
    .key-btn { margin-top: 10px; width: 100%; padding: 12px; background: var(--accent-subtle); border: 1px solid var(--accent); border-radius: 10px; color: var(--accent); font-size: 15px; font-weight: 600; cursor: pointer; }

    .skel { background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); height: 130px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .empty { text-align: center; padding: 50px 20px; color: var(--text2); font-size: 14px; }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div id="ptr"><span id="ptr-icon">↓ Ziehen</span></div>
<div id="app"></div>
<script>
/* ── Keys ────────────────────────────────────────── */
const LS = { key:'t_key', radius:'t_radius', cache:'t_cache', favs:'t_favs', hist:'t_hist', gps:'t_gps' };
const HANNOVER = { lat: 52.3759, lng: 9.7320 };
const RADII    = [3, 5, 10];
const FUEL     = 'e10';
const DAY_LABELS = ['So','Mo','Di','Mi','Do','Fr','Sa'];

/* ── Helpers ─────────────────────────────────────── */
function lsGet(k, d='')   { try { return localStorage.getItem(k) ?? d; } catch { return d; } }
function lsSet(k, v)      { try { localStorage.setItem(k, String(v)); } catch {} }
function lsJson(k, d)     { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } }
function lsJsonSet(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

function num(p)   { return p && p > 0 ? p : null; }
function fmt(p)   { return num(p) ? p.toFixed(3).replace('.', ',') + '\u202f€' : '–'; }
function fmtTime(d) { return d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' }); }
function today()  { return new Date().toISOString().slice(0, 10); }
function dayLabel(str) { const [y,m,d] = str.split('-').map(Number); return DAY_LABELS[new Date(y,m-1,d).getDay()]; }

/* ── Price History ───────────────────────────────── */
function getHist() { return lsJson(LS.hist, {}); }

function saveHist(stations) {
  const hist = getHist(), t = today();
  hist[t] = {};
  stations.forEach(s => { if (num(s[FUEL])) hist[t][s.id] = s[FUEL]; });
  const keys = Object.keys(hist).sort();
  while (keys.length > 7) delete hist[keys.shift()];
  lsJsonSet(LS.hist, hist);
}

function getTrend(id, price) {
  const hist = getHist(), t = today();
  const days = Object.keys(hist).filter(d => d < t).sort();
  if (!days.length || !price) return null;
  const prev = hist[days[days.length-1]]?.[id];
  if (!prev) return null;
  const d = price - prev;
  return Math.abs(d) < 0.002 ? 'eq' : d > 0 ? 'up' : 'down';
}

/* ── State ───────────────────────────────────────── */
const cached = lsJson(LS.cache, null);
let st = {
  key:      lsGet(LS.key),
  radius:   parseInt(lsGet(LS.radius, '10')) || 10,
  favs:     lsJson(LS.favs, []),
  useGps:   lsGet(LS.gps) === '1',
  gpsPos:   null,
  stations: cached?.stations || [],
  updated:  cached?.ts ? new Date(cached.ts) : null,
  loading:  false,
  error:    null,
};

/* ── Sort + Cheapest ─────────────────────────────── */
function sortedStations() {
  const list = [...st.stations].sort((a, b) => (num(a[FUEL]) || 9999) - (num(b[FUEL]) || 9999));
  return { favs: list.filter(s => st.favs.includes(s.id)), rest: list.filter(s => !st.favs.includes(s.id)), all: list };
}
function cheapestOf(list) {
  const ps = list.filter(s => s.isOpen).map(s => num(s[FUEL])).filter(Boolean);
  return ps.length ? Math.min(...ps) : null;
}

/* ── Favorites ───────────────────────────────────── */
function toggleFav(id, e) {
  e.stopPropagation();
  const i = st.favs.indexOf(id);
  if (i >= 0) st.favs.splice(i, 1); else st.favs.push(id);
  lsJsonSet(LS.favs, st.favs);
  render();
}

/* ── GPS ─────────────────────────────────────────── */
async function getPos() {
  if (!st.useGps) return HANNOVER;
  if (st.gpsPos) return st.gpsPos;
  return new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(
      p => { st.gpsPos = { lat: p.coords.latitude, lng: p.coords.longitude }; resolve(st.gpsPos); },
      () => resolve(HANNOVER),
      { timeout: 8000, maximumAge: 60000 }
    );
  });
}
function toggleGps() { st.useGps = !st.useGps; st.gpsPos = null; lsSet(LS.gps, st.useGps ? '1' : '0'); load(); }

/* ── Load ────────────────────────────────────────── */
async function load() {
  if (!st.key) return;
  st.loading = true; st.error = null;
  render();
  try {
    const pos  = await getPos();
    const url  = `https://creativecommons.tankerkoenig.de/json/list.php?lat=${pos.lat}&lng=${pos.lng}&rad=${st.radius}&sort=dist&type=all&apikey=${st.key}`;
    const data = await (await fetch(url)).json();
    if (!data.ok) throw new Error(data.message || 'API-Fehler');
    st.stations = data.stations || [];
    st.updated  = new Date();
    lsJsonSet(LS.cache, { stations: st.stations, ts: st.updated.toISOString() });
    saveHist(st.stations);
  } catch(e) { st.error = e.message; }
  st.loading = false;
  render();
}

/* ── Weekly Chart ────────────────────────────────── */
function renderWeeklyChart() {
  const hist = getHist();
  const t    = today();
  // all stored days, last 7, sorted
  const days = Object.keys(hist).sort().slice(-7);

  // compute daily cheapest price
  const pts = days.map(d => {
    const prices = Object.values(hist[d]).filter(p => p > 0);
    return { d, label: dayLabel(d), isToday: d === t, min: prices.length ? Math.min(...prices) : null };
  }).filter(x => x.min);

  const noData = pts.length < 2;

  // overall trend line
  let trendHtml = '';
  if (pts.length >= 2) {
    const first = pts[0], last = pts[pts.length - 1];
    const diff  = last.min - first.min;
    const absDiff = Math.abs(diff).toFixed(3).replace('.', ',');
    if (Math.abs(diff) < 0.002) {
      trendHtml = `<span class="week-trend eq">→ Unverändert</span>`;
    } else if (diff > 0) {
      trendHtml = `<span class="week-trend up">↑ +${absDiff} € seit ${first.label}</span>`;
    } else {
      trendHtml = `<span class="week-trend down">↓ −${absDiff} € seit ${first.label}</span>`;
    }
  }

  // SVG bars
  let svgContent = '';
  if (!noData) {
    const W = 460, BAR_H = 80, LABEL_H = 38, H = BAR_H + LABEL_H;
    const n    = pts.length;
    const colW = W / n;
    const barW = Math.min(colW * 0.52, 44);
    const minP = Math.min(...pts.map(x => x.min));
    const maxP = Math.max(...pts.map(x => x.min));
    const range = maxP - minP || 0.001;

    const bars = pts.map((x, i) => {
      const cx    = colW * i + colW / 2;
      // higher price = taller bar (standard chart)
      const ratio = (x.min - minP) / range;
      const bh    = 18 + ratio * (BAR_H - 22);
      const by    = BAR_H - bh;
      const isCheap = x.min === minP;
      const fill  = x.isToday ? '#4a7a93' : isCheap ? '#bae6fd' : '#3f3f46';
      const stroke = x.isToday ? '#bae6fd' : 'none';
      const labelCol = x.isToday ? '#fafafa' : isCheap ? '#bae6fd' : '#71717a';
      const priceStr = x.min.toFixed(3).replace('.', ',');
      const fw    = x.isToday ? '700' : '400';

      return `
        <rect x="${(cx - barW/2).toFixed(1)}" y="${by.toFixed(1)}" width="${barW}" height="${bh.toFixed(1)}" rx="5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
        <text x="${cx.toFixed(1)}" y="${(BAR_H + 16).toFixed(1)}" text-anchor="middle" font-size="11" fill="${labelCol}" font-weight="${fw}" font-family="system-ui,sans-serif">${x.label}</text>
        <text x="${cx.toFixed(1)}" y="${(BAR_H + 32).toFixed(1)}" text-anchor="middle" font-size="10" fill="${labelCol}" font-family="system-ui,sans-serif">${priceStr}</text>`;
    }).join('');

    svgContent = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible;">${bars}</svg>`;
  }

  return `
  <div class="week-card">
    <div class="week-header">
      <span class="week-title">Wochenentwicklung E10</span>
      ${trendHtml}
    </div>
    ${noData
      ? `<div class="week-nodata">Noch nicht genug Daten — ab morgen sichtbar</div>`
      : svgContent}
  </div>`;
}

/* ── Render ──────────────────────────────────────── */
function render() {
  document.getElementById('app').innerHTML = st.key ? renderMain() : renderSetup();
  attach();
}

function renderSetup() {
  return `
  <div class="setup">
    <div class="setup-icon">⛽</div>
    <h2>Tank App</h2>
    <p>Gib deinen Tankerkönig API-Key ein um E10-Preise zu sehen.</p>
    <input class="key-inp" id="kinp" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    <button class="key-btn" id="ksave">Speichern &amp; starten</button>
  </div>`;
}

function renderMain() {
  const { favs, rest, all } = sortedStations();
  const minPrice = cheapestOf(all);
  const hasCache = st.stations.length > 0;
  const loc = st.useGps && st.gpsPos ? `GPS · ${st.radius}\u202fkm` : `Hannover · ${st.radius}\u202fkm`;

  const mkCards = list => list.map(s => renderCard(s, minPrice)).join('');
  let cardsHtml;
  if (st.loading && !hasCache) {
    cardsHtml = Array(5).fill(0).map(() => `<div class="skel"></div>`).join('');
  } else if (!all.length) {
    cardsHtml = `<div class="empty"><div class="empty-icon">🔍</div>Keine Stationen gefunden</div>`;
  } else if (favs.length && rest.length) {
    cardsHtml = mkCards(favs) + `<div class="list-divider">Alle Stationen</div>` + mkCards(rest);
  } else {
    cardsHtml = mkCards(all);
  }

  return `
  <header>
    <div class="header-left">
      <h1>⛽ Tank App</h1>
      <div class="header-sub">${loc} Umkreis</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn${st.useGps ? ' active' : ''}" id="gpsbtn" title="GPS">📍</button>
      <button class="icon-btn" id="sbtn" title="API-Key">⚙</button>
      <button class="icon-btn${st.loading ? ' spinning' : ''}" id="rbtn" title="Aktualisieren">↻</button>
    </div>
  </header>

  <div class="controls">
    <div class="opt-group">
      <span class="opt-label">Umkreis:</span>
      ${RADII.map(r => `<button class="opt-btn${st.radius===r?' active':''}" data-rad="${r}">${r}&thinsp;km</button>`).join('')}
    </div>
  </div>

  <div class="statusbar">
    ${st.loading ? '<div class="status-dot"></div>' : ''}
    <div class="${st.error ? 'status-err' : 'status-text'}">
      ${st.error
        ? 'Fehler: ' + st.error + (st.updated ? ' · ' + fmtTime(st.updated) : '')
        : st.updated
          ? (st.loading ? 'Aktualisiere…' : 'Stand: ' + fmtTime(st.updated)) + ' · ' + all.length + ' Stationen'
          : st.loading ? 'Lade…' : ''}
    </div>
  </div>

  <div class="list">
    ${renderWeeklyChart()}
    ${cardsHtml}
  </div>`;
}

function renderCard(s, minPrice) {
  const p     = num(s[FUEL]);
  const isMin = minPrice !== null && p === minPrice;
  const isFav = st.favs.includes(s.id);
  const trend = getTrend(s.id, p);

  const tags = [
    isMin ? `<span class="tag tag-cheapest">★ Günstigste E10</span>` : '',
    isFav ? `<span class="tag tag-fav">♥ Favorit</span>` : '',
  ].filter(Boolean).join('');

  const trendHtml = trend === 'up'   ? `<span class="trend trend-up" title="Teurer als gestern">↑</span>`
                  : trend === 'down' ? `<span class="trend trend-down" title="Günstiger als gestern">↓</span>`
                  : trend === 'eq'   ? `<span class="trend trend-eq" title="Gleich wie gestern">→</span>` : '';

  const cls = ['s-card', isMin ? 'cheapest' : '', isFav ? 'fav-card' : ''].filter(Boolean).join(' ');

  return `
  <div class="${cls}" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}','_blank')">
    <div class="s-top">
      <div class="s-info">
        <div class="s-name">${s.name || s.brand || 'Tankstelle'}</div>
        ${s.brand ? `<div class="s-brand">${s.brand}</div>` : ''}
        <div class="s-addr">${[s.street, s.place].filter(Boolean).join(', ')}</div>
      </div>
      <div class="s-right">
        <button class="fav-btn${isFav?' on':''}" onclick="toggleFav('${s.id}',event)">${isFav ? '♥' : '♡'}</button>
        <span class="dist-badge">${s.dist ? s.dist.toFixed(1)+'\u202fkm' : ''}</span>
        <span class="open-pill ${s.isOpen?'open':'closed'}">${s.isOpen ? 'Offen' : 'Zu'}</span>
      </div>
    </div>
    ${tags ? `<div class="tags-row">${tags}</div>` : ''}
    <div class="price-row">
      <div class="price-main${isMin ? ' accent' : ''}">${fmt(s[FUEL])}</div>
      ${trendHtml}
    </div>
  </div>`;
}

/* ── Attach ──────────────────────────────────────── */
function attach() {
  const ksave = document.getElementById('ksave');
  const kinp  = document.getElementById('kinp');
  if (ksave) {
    ksave.onclick = () => { const v = kinp.value.trim(); if (v) { st.key = v; lsSet(LS.key, v); load(); } };
    kinp.onkeydown = e => { if (e.key === 'Enter') ksave.click(); };
  }
  const rbtn = document.getElementById('rbtn');
  const sbtn = document.getElementById('sbtn');
  const gpsbtn = document.getElementById('gpsbtn');
  if (rbtn)   rbtn.onclick   = () => { if (!st.loading) load(); };
  if (gpsbtn) gpsbtn.onclick = toggleGps;
  if (sbtn)   sbtn.onclick   = () => {
    const v = prompt('Tankerkönig API-Key:', st.key);
    if (v !== null && v.trim()) { st.key = v.trim(); lsSet(LS.key, st.key); load(); }
  };
  document.querySelectorAll('[data-rad]').forEach(el => {
    el.onclick = () => { st.radius = parseInt(el.dataset.rad); lsSet(LS.radius, st.radius); load(); };
  });
}

/* ── Pull-to-Refresh ─────────────────────────────── */
const ptr_el = document.getElementById('ptr');
const ptr_icon = document.getElementById('ptr-icon');
let ptr_startY = 0, ptr_pulling = false;
document.addEventListener('touchstart', e => { ptr_startY = window.scrollY < 5 ? e.touches[0].clientY : 0; }, { passive: true });
document.addEventListener('touchmove', e => {
  if (!ptr_startY || st.loading) return;
  const dy = e.touches[0].clientY - ptr_startY;
  if (dy > 4) { ptr_pulling = true; const h = Math.min(dy * 0.75, 52); ptr_el.style.height = h + 'px'; ptr_icon.textContent = h >= 28 ? '↺ Loslassen' : '↓ Ziehen'; }
}, { passive: true });
document.addEventListener('touchend', () => {
  if (ptr_pulling && parseInt(ptr_el.style.height) >= 28) { ptr_el.style.height = '42px'; ptr_icon.textContent = '⟳ Aktualisiere…'; load().finally(() => { ptr_el.style.height = '0'; }); }
  else { ptr_el.style.height = '0'; }
  ptr_startY = 0; ptr_pulling = false;
}, { passive: true });

/* ── Auto-Refresh & Boot ─────────────────────────── */
setInterval(() => { if (st.key && !st.loading) load(); }, 5 * 60 * 1000);
if (st.key) load(); else render();
</script>
</body>
