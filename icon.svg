<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- dark background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0b"/>

  <!-- pump body (red) -->
  <rect x="100" y="160" width="190" height="260" rx="16" fill="#dc2626"/>
  <!-- body highlight -->
  <rect x="100" y="160" width="190" height="40" rx="16" fill="#ef4444"/>
  <rect x="100" y="184" width="190" height="16" fill="#ef4444"/>

  <!-- screen window -->
  <rect x="122" y="220" width="146" height="80" rx="10" fill="#1c1917"/>
  <rect x="130" y="228" width="130" height="64" rx="7" fill="#0c2840"/>
  <!-- E10 on screen -->
  <text x="195" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="800" fill="#bae6fd" text-anchor="middle">E10</text>

  <!-- base -->
  <rect x="88" y="420" width="214" height="22" rx="11" fill="#991b1b"/>

  <!-- nozzle pipe vertical -->
  <rect x="290" y="180" width="18" height="110" rx="9" fill="#7f1d1d"/>
  <!-- nozzle pipe horizontal -->
  <rect x="290" y="278" width="90" height="18" rx="9" fill="#7f1d1d"/>
  <!-- nozzle hook -->
  <rect x="362" y="255" width="18" height="60" rx="9" fill="#7f1d1d"/>
  <!-- nozzle tip -->
  <rect x="348" y="298" width="40" height="14" rx="7" fill="#b91c1c"/>

  <!-- fuel cap circle -->
  <circle cx="368" cy="175" r="32" fill="#991b1b"/>
  <circle cx="368" cy="175" r="20" fill="#7f1d1d"/>
  <rect x="358" y="168" width="20" height="4" rx="2" fill="#fca5a5"/>
  <rect x="364" y="162" width="8" height="26" rx="2" fill="#fca5a5"/>

  <!-- bottom vent lines -->
  <rect x="122" y="320" width="146" height="6" rx="3" fill="#b91c1c"/>
  <rect x="122" y="340" width="146" height="6" rx="3" fill="#b91c1c"/>
  <rect x="122" y="360" width="146" height="6" rx="3" fill="#b91c1c"/>
</svg>
