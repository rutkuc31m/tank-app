name: Daily E10 Prices

on:
  schedule:
    - cron: '0 6,8,10,12,14,16,18,20 * * *'  # alle 2h, 8-22 Uhr MEZ
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Preise abrufen
        run: python fetch_prices.py
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}

      - name: prices.json committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update daily E10 prices $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
